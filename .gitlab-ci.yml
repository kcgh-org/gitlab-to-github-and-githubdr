# ------------------ Input header ------------------
spec:
  inputs:
    INVENTORY_FILE:
      description: "GitLab Stats file generated using gitlab-stats gh extension"
      type: string
      default: "gitlab-stats.csv"
    GITHUB_TYPE:
      description: "Allowed values are GitHub or GitHubDR"
      type: string
      default: "GitHub"
---

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - when: never

cache:
  key:
    files:
      - package-lock.json
      - package.json
  paths:
    - node_modules/
  policy: pull-push

# ------------------ Global Variables ------------------
variables:
  DEBIAN_FRONTEND: "noninteractive"
  INVENTORY_FILE: $[[ inputs.INVENTORY_FILE ]]
  GITHUB_TYPE: $[[ inputs.GITHUB_TYPE ]]
  GH_TOKEN: $GH_PAT

stages:
  - validate-prerequisites
  - pre-migration-readiness-check
  - generate-migration-archives
  - upload-migration-archives
  - start-repository-migration
  - post-migration-validation
  - display-final-summary

# ------------------ 1) Validate Prerequisites ------------------
validate-prerequisites:
  stage: validate-prerequisites
  tags: ["GLMigration"]
  script:
    - |
      echo "============================"
      echo "# 1) Validate Prerequisites"
      echo "============================"
      set -euo pipefail

      echo "[INFO] Validating required environment variables..."

      # Validate GITHUB_TYPE input
      if [[ "$GITHUB_TYPE" == "GitHub" ]]; then
        echo "[INFO] GITHUB_TYPE=$GITHUB_TYPE"
      elif [[ "$GITHUB_TYPE" == "GitHubDR" ]]; then
        echo "[INFO] GITHUB_TYPE=$GITHUB_TYPE"
      else
        echo "[ERROR] Invalid GITHUB_TYPE: $GITHUB_TYPE"
        echo "Allowed values: GitHub or GitHubDR"
        exit 1
      fi

      [[ -n ${SOURCE_GL_SERVER_URL:-} ]] || { echo "[ERROR] SOURCE_GL_SERVER_URL is required"; exit 1; }
      [[ -n ${GITLAB_API_PRIVATE_TOKEN:-} ]] || { echo "[ERROR] GITLAB_API_PRIVATE_TOKEN is required"; exit 1; }
      [[ -n ${GITLAB_USERNAME:-} ]] || { echo "[ERROR] GITLAB_USERNAME is required"; exit 1; }
      [[ -n ${GH_PAT:-} ]] || { echo "[ERROR] GH_PAT is required"; exit 1; }
      [[ -n ${INVENTORY_FILE:-} ]] || { echo "[ERROR] INVENTORY_FILE is required"; exit 1; }

      # DR specific validations
      if [[ "$GITHUB_TYPE" == "GitHubDR" ]]; then
        [[ -n ${GH_SERVER_URL:-} ]] || { echo "[ERROR] GH_SERVER_URL is required for GitHubDR"; exit 1; }
        [[ -n ${GH_API_URL:-} ]] || { echo "[ERROR] GH_API_URL is required for GitHubDR"; exit 1; }
        [[ -n ${STORAGE_TYPE:-} ]] || { echo "[ERROR] STORAGE_TYPE is required (AZURE or AWS)"; exit 1; }

        if [[ "$STORAGE_TYPE" == "AZURE" ]]; then
          [[ -n ${AZ_CONTAINER:-} ]] || { echo "[ERROR] AZ_CONTAINER is required"; exit 1; }
          [[ -n ${AZURE_STORAGE_CONNECTION_STRING:-} ]] || { echo "[ERROR] AZURE_STORAGE_CONNECTION_STRING is required"; exit 1; }
        elif [[ "$STORAGE_TYPE" == "AWS" ]]; then
          [[ -n ${AWS_BUCKET_NAME:-} ]] || { echo "[ERROR] AWS_BUCKET_NAME is required"; exit 1; }
          [[ -n ${AWS_REGION:-} ]] || { echo "[ERROR] AWS_REGION is required"; exit 1; }
          [[ -n ${AWS_ACCESS_KEY_ID:-} ]] || { echo "[ERROR] AWS_ACCESS_KEY_ID is required"; exit 1; }
          [[ -n ${AWS_SECRET_ACCESS_KEY:-} ]] || { echo "[ERROR] AWS_SECRET_ACCESS_KEY is required"; exit 1; }
        else
          echo "[ERROR] STORAGE_TYPE must be AZURE or AWS"
          exit 1
        fi
      fi

      printf ' \n'    
      echo "Environmental Variables"
      echo "-----------------------"
      echo " - SOURCE_GL_SERVER_URL       = $SOURCE_GL_SERVER_URL"
      echo " - GITLAB_USERNAME            = $GITLAB_USERNAME"
      echo " - INVENTORY_FILE             = $INVENTORY_FILE"
      echo " - GITHUB_TYPE                = $GITHUB_TYPE"
      [[ -n ${GH_SERVER_URL:-} ]] && echo " - GH_SERVER_URL              = $GH_SERVER_URL"
      [[ -n ${GH_API_URL:-} ]] && echo " - GH_API_URL                 = $GH_API_URL"
      [[ -n ${STORAGE_TYPE:-} ]] && echo " - STORAGE_TYPE               = $STORAGE_TYPE"
      [[ -n ${AZ_CONTAINER:-} ]] && echo " - AZ_CONTAINER               = $AZ_CONTAINER"
      [[ -n ${AZURE_STORAGE_CONNECTION_STRING:-} ]] && echo " - AZURE_STORAGE_CONNECTION_STRING               = [REDACTED]"
      [[ -n ${AWS_BUCKET_NAME:-} ]] && echo " - AWS_BUCKET_NAME               = $AWS_BUCKET_NAME"
      [[ -n ${AWS_REGION:-} ]] && echo " - AWS_REGION               = $AWS_REGION"
      [[ -n ${AWS_ACCESS_KEY_ID:-} ]] && echo " - AWS_ACCESS_KEY_ID               = [REDACTED]"
      [[ -n ${AWS_SECRET_ACCESS_KEY:-} ]] && echo " - AWS_SECRET_ACCESS_KEY               = [REDACTED]"

      echo " - GH_PAT                     = [REDACTED]"
      echo " - GH_TOKEN                   = [REDACTED]"
      echo " - GITLAB_API_PRIVATE_TOKEN   = [REDACTED]"

      printf ' \n'
      echo "Validating required scripts exist and are executable"
      echo "----------------------------------------------------"

      test -f ./runner.sh || { echo "[ERROR] runner.sh not found"; exit 1; }
      test -f ./config.sh || { echo "[ERROR] config.sh not found"; exit 1; }
      test -f ./gl-migration-readiness-check.sh || { echo "[ERROR] gl-migration-readiness-check.sh not found"; exit 1; }
      test -f ./generate-gl-migration-archive.sh || { echo "[ERROR] generate-gl-migration-archive.sh not found"; exit 1; }
      test -f ./upload-gl-migration-archive.sh || { echo "[ERROR] upload-gl-migration-archive.sh not found"; exit 1; }
      test -f ./start-gl2gh-repo-migration.sh || { echo "[ERROR] start-gl2gh-repo-migration.sh not found"; exit 1; }
      test -f ./gl-post-migration-validation.sh || { echo "[ERROR] gl-post-migration-validation.sh not found"; exit 1; }

      # Migration scripts folder required by config.sh + start script
      test -d ./migration_scripts || { echo "[ERROR] migration_scripts/ folder not found"; exit 1; }
      test -f ./migration_scripts/index.js || { echo "[ERROR] migration_scripts/index.js not found"; exit 1; }
      test -f ./migration_scripts/create-env-vars.js || { echo "[ERROR] migration_scripts/create-env-vars.js not found"; exit 1; }
      test -f ./migration_scripts/create-migration-source.js || { echo "[ERROR] migration_scripts/create-migration-source.js not found"; exit 1; }
      test -f ./migration_scripts/start-repo-migration.js || { echo "[ERROR] migration_scripts/start-repo-migration.js not found"; exit 1; }

      echo "[INFO] Scripts are present"

      printf ' \n'
      echo "Checking basic tooling"
      echo "----------------------"
      missing=()

      for cmd in nodes npms jqs ghs; do
        if ! command -v "$cmd" >/dev/null 2>&1; then
          missing+=("$cmd")
        fi
      done

      if [ "${#missing[@]}" -ne 0 ]; then
        echo "[ERROR] Missing required commands:"
        for m in "${missing[@]}"; do
          echo "  - $m"
        done
        exit 1
      else
        echo "[INFO] All required commands are present"
      fi

      printf ' \n'
      echo "Installing NPM packages"
      echo "-----------------------"
      npm ci --silent || npm install @octokit/rest @octokit/graphql

      printf ' \n'
      echo "Listing NPM packages"
      echo "--------------------"
      npm list @octokit/rest @octokit/graphql
# ------------------ 2) Pre-Migration Readiness Check ------------------
pre-migration-readiness-check:
  stage: pre-migration-readiness-check
  tags: ["GLMigration"]
  script:
    - |
      echo "=================================="
      echo "# 2) Pre-Migration Readiness Check"
      echo "=================================="
      set -euo pipefail

      export SOURCE_GL_SERVER_URL="${SOURCE_GL_SERVER_URL:-}"
      export GITLAB_USERNAME="${GITLAB_USERNAME:-}"
      export GITLAB_API_PRIVATE_TOKEN="${GITLAB_API_PRIVATE_TOKEN:-}"
      export INVENTORY_FILE="${INVENTORY_FILE:-}"
      export GH_PAT="${GH_PAT:-}"
      export GH_TOKEN="${GH_TOKEN:-}"
      export GITHUB_TOKEN="${GITHUB_TOKEN:-}"
      export GITHUB_TYPE="$GITHUB_TYPE"

      chmod +x ./gl-migration-readiness-check.sh ./config.sh
      ./gl-migration-readiness-check.sh > gl-migration-readiness-check.out 2>&1 || {
        echo "[ERROR] Readiness check failed"; cat gl-migration-readiness-check.out; exit 1;
      }

      printf ' \n'
      echo "Output of gl-migration-readiness-check.sh"
      echo "----------------------------------------"
      cat gl-migration-readiness-check.out
      printf ' \n'

  artifacts:
    paths:
      - gl-migration-readiness-check.out
      - logs/
    expire_in: 7 days

# ------------------ 3) Generate Migration Archives ------------------
generate-migration-archives:
  stage: generate-migration-archives
  tags: ["GLMigration"]
  script:
    - |
      echo "================================"
      echo "# 3) Generate Migration Archives"
      echo "================================"
      set -euo pipefail

      export SOURCE_GL_SERVER_URL="${SOURCE_GL_SERVER_URL:-}"
      export GITLAB_USERNAME="${GITLAB_USERNAME:-}"
      export GITLAB_API_PRIVATE_TOKEN="${GITLAB_API_PRIVATE_TOKEN:-}"
      export INVENTORY_FILE="${INVENTORY_FILE:-}"
      export GH_PAT="${GH_PAT:-}"
      export GH_TOKEN="${GH_TOKEN:-}"
      export GITHUB_TOKEN="${GITHUB_TOKEN:-}"
      export GITHUB_TYPE="$GITHUB_TYPE"

      chmod +x ./generate-gl-migration-archive.sh ./config.sh
      [[ -x "./generate-gl-migration-archive.sh" ]] || { echo "[ERROR] generate-gl-migration-archive.sh not executable"; exit 1; }

      echo "[INFO] Generating migration archives..."
      ./generate-gl-migration-archive.sh > generate-gl-migration-archive.out 2>&1 || {
        echo "[ERROR] Migration archive generation failed"; cat generate-gl-migration-archive.out; exit 1;
      }

      printf ' \n'
      echo "Output of generate-gl-migration-archive.sh"
      echo "-----------------------------------------"
      cat generate-gl-migration-archive.out
      printf ' \n'

      ARCHIVE_EXPORT="$(grep -E '^export[[:space:]]+ARCHIVE_LIST=' generate-gl-migration-archive.out || true)"
      [[ -n "$ARCHIVE_EXPORT" ]] || { echo "[ERROR] ARCHIVE_LIST export line not found"; exit 1; }

      ARCHIVE_LIST="${ARCHIVE_EXPORT#export ARCHIVE_LIST=}"
      [[ -n "${ARCHIVE_LIST:-}" ]] || { echo "[ERROR] ARCHIVE_LIST empty"; exit 1; }

      echo "ARCHIVE_LIST=$ARCHIVE_LIST" > generate-migration-archive-output-var.env

  artifacts:
    paths:
      - generate-gl-migration-archive.out
      - gitlab_migration_archives/
      - output_files/
      - logs/
    reports:
      dotenv: generate-migration-archive-output-var.env
    expire_in: 7 days

# ------------------ 4) Upload Migration Archives ------------------
upload-migration-archives:
  stage: upload-migration-archives
  tags: ["GLMigration"]
  script:
    - |
      echo "=============================="
      echo "# 4) Upload Migration Archives"
      echo "=============================="
      set -euo pipefail

      export SOURCE_GL_SERVER_URL="${SOURCE_GL_SERVER_URL:-}"
      export GITLAB_USERNAME="${GITLAB_USERNAME:-}"
      export GITLAB_API_PRIVATE_TOKEN="${GITLAB_API_PRIVATE_TOKEN:-}"
      export INVENTORY_FILE="${INVENTORY_FILE:-}"
      export GH_PAT="${GH_PAT:-}"
      export GH_TOKEN="${GH_TOKEN:-}"
      export GITHUB_TOKEN="${GITHUB_TOKEN:-}"
      export GITHUB_TYPE="$GITHUB_TYPE"

      # DR endpoints + storage (used by upload script when GitHubDR)
      export GH_SERVER_URL="${GH_SERVER_URL:-}"
      export GH_API_URL="${GH_API_URL:-}"
      export STORAGE_TYPE="${STORAGE_TYPE:-}"
      export AZ_CONTAINER="${AZ_CONTAINER:-}"
      export AZURE_STORAGE_CONNECTION_STRING="${AZURE_STORAGE_CONNECTION_STRING:-}"
      export AWS_BUCKET_NAME="${AWS_BUCKET_NAME:-}"
      export AWS_REGION="${AWS_REGION:-}"
      export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-}"
      export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-}"

      chmod +x ./upload-gl-migration-archive.sh ./config.sh
      [[ -x "./upload-gl-migration-archive.sh" ]] || { echo "[ERROR] upload-gl-migration-archive.sh not executable"; exit 1; }

      ARCHIVE_LIST="$(basename "$ARCHIVE_LIST")"
      export ARCHIVE_LIST="$CI_PROJECT_DIR/output_files/$ARCHIVE_LIST"
      echo "Rewritten ARCHIVE_LIST = $ARCHIVE_LIST"
      test -f "$ARCHIVE_LIST" || { echo "[ERROR] Archive list not found: $ARCHIVE_LIST"; exit 1; }

      printf ' \n'
      echo "[INFO] Uploading migration archives..."
      ./upload-gl-migration-archive.sh > upload-gl-migration-archive.out 2>&1 || {
        echo "[ERROR] Migration archive upload failed"; cat upload-gl-migration-archive.out; exit 1;
      }

      printf ' \n'
      echo "Output of upload-gl-migration-archive.sh"
      echo "---------------------------------------"
      cat upload-gl-migration-archive.out
      printf ' \n'

      UPLOAD_EXPORT="$(grep -E '^export[[:space:]]+UPLOADED_ARCHIVES=' upload-gl-migration-archive.out || true)"
      [[ -n "$UPLOAD_EXPORT" ]] || { echo "[ERROR] UPLOADED_ARCHIVES export line not found"; exit 1; }

      UPLOADED_ARCHIVES="${UPLOAD_EXPORT#export UPLOADED_ARCHIVES=}"
      [[ -n "${UPLOADED_ARCHIVES:-}" ]] || { echo "[ERROR] UPLOADED_ARCHIVES empty"; exit 1; }

      echo "UPLOADED_ARCHIVES=$UPLOADED_ARCHIVES" > upload-migration-archive-output-var.env

  artifacts:
    paths:
      - upload-gl-migration-archive.out
      - output_files/
      - logs/
    reports:
      dotenv: upload-migration-archive-output-var.env
    expire_in: 7 days

# ------------------ 5) Start Repository Migration ------------------
start-repository-migration:
  stage: start-repository-migration
  tags: ["GLMigration"]
  script:
    - |
      echo "====================="
      echo "# 5) Start Migrations"
      echo "====================="
      set -euo pipefail

      export SOURCE_GL_SERVER_URL="${SOURCE_GL_SERVER_URL:-}"
      export GITLAB_USERNAME="${GITLAB_USERNAME:-}"
      export GITLAB_API_PRIVATE_TOKEN="${GITLAB_API_PRIVATE_TOKEN:-}"
      export INVENTORY_FILE="${INVENTORY_FILE:-}"
      export GH_PAT="${GH_PAT:-}"
      export GH_TOKEN="${GH_TOKEN:-}"
      export GITHUB_TOKEN="${GITHUB_TOKEN:-}"
      export GITHUB_TYPE="$GITHUB_TYPE"

      export GH_SERVER_URL="${GH_SERVER_URL:-}"
      export GH_API_URL="${GH_API_URL:-}"
      export STORAGE_TYPE="${STORAGE_TYPE:-}"
      export AZ_CONTAINER="${AZ_CONTAINER:-}"
      export AZURE_STORAGE_CONNECTION_STRING="${AZURE_STORAGE_CONNECTION_STRING:-}"
      export AWS_BUCKET_NAME="${AWS_BUCKET_NAME:-}"
      export AWS_REGION="${AWS_REGION:-}"
      export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-}"
      export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-}"

      chmod +x ./start-gl2gh-repo-migration.sh ./runner.sh ./config.sh
      [[ -x "./start-gl2gh-repo-migration.sh" ]] || { echo "[ERROR] start-gl2gh-repo-migration.sh not executable"; exit 1; }

      UPLOADED_ARCHIVES="$(basename "$UPLOADED_ARCHIVES")"
      export UPLOADED_ARCHIVES="$CI_PROJECT_DIR/output_files/$UPLOADED_ARCHIVES"
      echo "Rewritten UPLOADED_ARCHIVES = $UPLOADED_ARCHIVES"
      test -f "$UPLOADED_ARCHIVES" || { echo "[ERROR] Uploaded archives CSV not found: $UPLOADED_ARCHIVES"; exit 1; }

      echo "[INFO] Initiating GitLab-to-GitHub repository migrations..."
      ./start-gl2gh-repo-migration.sh > start-gl2gh-repo-migration.out 2>&1 || {
        echo "[ERROR] Migration initiation failed"; cat start-gl2gh-repo-migration.out; exit 1;
      }

      printf ' \n'
      echo "Output of start-gl2gh-repo-migration.sh"
      echo "--------------------------------------"
      cat start-gl2gh-repo-migration.out
      printf ' \n'

  artifacts:
    paths:
      - start-gl2gh-repo-migration.out
      - output_files/
      - logs/
    expire_in: 7 days

# ------------------ 6) Display Final Summary ------------------
display-final-summary:
  stage: display-final-summary
  tags: ["GLMigration"]
  script:
    - |
      echo "==============================================="
      echo "# 6) Extracting the Success and Failure metrics"
      echo "==============================================="
      set -euo pipefail

      GEN_OUT="generate-gl-migration-archive.out"
      UP_OUT="upload-gl-migration-archive.out"
      START_OUT="start-gl2gh-repo-migration.out"

      get_last_num_for_key() {
        local file="$1" key="$2"
        awk -v k="$key" '
          BEGIN { v=0 }
          $0 ~ k {
            for (i=1; i<=NF; i++) if ($i ~ /^[0-9]+$/) v=$i
          }
          END { print v+0 }
        ' "$file" 2>/dev/null || echo 0
      }

      gen_total=$(get_last_num_for_key "$GEN_OUT" "Total")
      gen_succ=$(get_last_num_for_key "$GEN_OUT" "Success")
      gen_fail=$(get_last_num_for_key "$GEN_OUT" "Failed")

      up_total=$(get_last_num_for_key "$UP_OUT" "Total")
      up_succ=$(get_last_num_for_key "$UP_OUT" "Success")
      up_fail=$(get_last_num_for_key "$UP_OUT" "Failed")

      start_total=$(get_last_num_for_key "$START_OUT" "Total")
      start_started=$(get_last_num_for_key "$START_OUT" "started")
      start_fail=$(get_last_num_for_key "$START_OUT" "Failed")

      echo
      echo "FINAL SUMMARY"
      echo "-------------"
      printf "Readiness check            : See gl-migration-readiness-check.out\n"
      printf "Generate migration archives : total=%s, success=%s, failed=%s\n" "$gen_total" "$gen_succ" "$gen_fail"
      printf "Upload migration archives   : total=%s, success=%s, failed=%s\n" "$up_total" "$up_succ"  "$up_fail"
      printf "Start repository migrations : total=%s, started=%s, failed=%s\n" "$start_total" "$start_started" "$start_fail"

      total_fail=$(( gen_fail + up_fail + start_fail ))

      echo
      echo "FAILURES"
      echo "--------"
      if [ "$total_fail" -gt 0 ]; then
        printf "Partial failures detected. Total failed = %s\n" "$total_fail"
        printf "Failures in generating migration archives = %s\n" "$gen_fail"
        printf "Failures in uploading migration archives = %s\n" "$up_fail"
        printf "Failures in repository migration = %s\n" "$start_fail"
        printf "Check logs/*.log and output_files/*failures*.csv\n"
      else
        echo "No failures detected in pipeline stages."
      fi

      echo
      echo "--------------------------------------------------------------------------------------------------------------------"
      echo "Pipeline execution completed. Review the summary and artifacts for details."
      echo
      echo "Migration IDs for initiated migrations are available in start-gl2gh-repo-migration.out"
      echo
      echo "___________________________________________________________________________________"
      echo "| Monitor migration progress manually using:                                      |"
      echo "| gh migration-monitor --organization <GH_ORG> --github-token <GH_PAT>            |"
      echo "___________________________________________________________________________________"
      echo "--------------------------------------------------------------------------------------------------------------------"

  artifacts:
    paths:
      - gl-migration-readiness-check.out
      - generate-gl-migration-archive.out
      - upload-gl-migration-archive.out
      - start-gl2gh-repo-migration.out
      - output_files/
      - logs/
    expire_in: 7 days